services:
  api:
    build:
      context: ./api
    container_name: api
    environment:
      QDRANT_URL: http://host.docker.internal:6333
      OLLAMA_URL: http://host.docker.internal:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app

  # ollama:
  #   image: ollama/ollama
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  web:
    build:
      context: ./web
    container_name: web
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app

volumes:
  qdrant_data:
  ollama:
